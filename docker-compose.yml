# =============================================================================
# docker-compose.yml — Laboratorio Honeytokens & Defensa Activa
# Levanta 3 servicios orquestados:
#   1. postgres_honeylab  → Base de datos con auditoría + honeytokens
#   2. traffic_simulator  → Genera tráfico SQL realista (95% normal, 5% cebo)
#   3. dashboard_soc      → Web SOC con SSE en tiempo real + respuesta SOAR
# =============================================================================
# Inicio rápido:
#   docker compose up -d --build
#   Abrir http://localhost:5001
# =============================================================================

services:

  # ===========================================================================
  # SERVICIO 1: PostgreSQL 16 con auditoría completa
  # ===========================================================================
  postgres_honeylab:
    image: postgres:16-alpine
    container_name: honeylab_db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       honeylab
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: SuperAdmin_Lab_2024!

    ports:
      - "5433:5432"   # Puerto 5433 para no colisionar con Postgres locales

    volumes:
      # Script de inicialización (schema + datos + honeytoken + triggers)
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

      # Configuración de auditoría (log_statement=all, log_connections=on)
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro

      # Logs en bind mount → postgres puede escribir, Python puede leer
      - ./logs:/var/log/postgresql

      # Datos persistentes
      - postgres_data:/var/lib/postgresql/data

    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
        -c log_destination=stderr
        -c logging_collector=on
        -c log_directory=/var/log/postgresql
        -c log_filename=postgresql-%Y-%m-%d.log
        -c log_statement=all
        -c log_connections=on
        -c log_disconnections=on
        -c log_line_prefix='%t [%p] %u@%d [%r] [%i] '
        -c log_min_duration_statement=0

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d honeylab"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # SERVICIO 2: Simulador de tráfico SQL
  #   - 95%  → empleado_normal hace SELECTs legítimos (tb_clientes, tb_facturacion)
  #   -  5%  → empleado_sospechoso cae en la honeytoken
  # ===========================================================================
  traffic_simulator:
    build: .
    container_name: honeylab_traffic
    restart: unless-stopped

    depends_on:
      postgres_honeylab:
        condition: service_healthy

    environment:
      DB_HOST: postgres_honeylab
      DB_PORT: "5432"
      DB_NAME: honeylab

    volumes:
      # Mismo bind mount de logs que PostgreSQL
      - ./logs:/app/logs

    command: python traffic_simulator.py

  # ===========================================================================
  # SERVICIO 3: Dashboard SOC web (Flask + SSE)
  #   - Panel izquierdo: feed de tráfico SQL en directo
  #   - Panel derecho: alertas honeytoken + respuesta SOAR
  #   - Ejecuta REVOKE automático al detectar intrusión
  # ===========================================================================
  dashboard_soc:
    build: .
    container_name: honeylab_dashboard
    restart: unless-stopped

    depends_on:
      postgres_honeylab:
        condition: service_healthy

    ports:
      - "5001:5001"

    environment:
      DB_HOST: postgres_honeylab
      DB_PORT: "5432"
      DB_NAME: honeylab

    volumes:
      # Mismo bind mount de logs que PostgreSQL
      - ./logs:/app/logs

    command: python dashboard_soc.py

# =============================================================================
# VOLÚMENES PERSISTENTES
# =============================================================================
volumes:
  postgres_data:
    name: honeylab_pgdata
