# =============================================================================
# postgresql.conf — Configuración de Auditoría Completa
# Laboratorio Honeytokens & Defensa Activa
# =============================================================================

# --- LOGGING GENERAL ---
log_destination = 'stderr'
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_file_mode = 0640

# --- QUÉ REGISTRAR ---
# Todas las sentencias SQL ejecutadas (DDL + DML + SELECT)
log_statement = 'all'

# Registrar la duración de cada query
log_duration = on

# Registrar conexiones y desconexiones (con IP de origen)
log_connections = on
log_disconnections = on

# Las autenticaciones fallidas se registran automáticamente
# con log_connections=on + log_min_messages=warning (estándar PostgreSQL)

# Registrar el host remoto (IP del cliente) en cada línea de log
log_hostname = off          # off = solo IP, más rápido y fiable
log_line_prefix = '%t [%p] %u@%d [%r] [%i] '
# Explicación de variables:
#   %t = timestamp con timezone
#   %p = PID del proceso
#   %u = nombre de usuario PostgreSQL
#   %d = nombre de la base de datos
#   %r = IP:puerto del cliente remoto
#   %i = tipo de comando (idle, SELECT, etc.)

# --- NIVEL DE LOG ---
log_min_messages = warning
log_min_error_statement = error
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0          # Registrar todos los ficheros temporales

# --- RENDIMIENTO (para laboratorio, sin impacto) ---
log_min_duration_statement = 0   # Loguear TODAS las queries (sin umbral mínimo)
